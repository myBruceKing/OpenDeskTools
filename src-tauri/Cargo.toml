[package]
name = "open-desk-tools"
version = "0.1.0"
description = "Background-first Windows desktop toolbox"
authors = ["bruce"]
edition = "2021"
license-file = "../LICENSE"

[lib]
name = "open_desk_tools_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
